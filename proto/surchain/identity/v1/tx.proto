syntax = "proto3";
package surchain.identity.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "surchain/identity/v1/params.proto";

option go_package = "github.com/surprotocol/surchain/x/identity/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // RegisterUsername registers a new unique username with an initial device commitment.
  rpc RegisterUsername(MsgRegisterUsername) returns (MsgRegisterUsernameResponse);

  // AddDevice adds a new device commitment to an existing identity.
  rpc AddDevice(MsgAddDevice) returns (MsgAddDeviceResponse);

  // RevokeDevice revokes an existing device commitment.
  rpc RevokeDevice(MsgRevokeDevice) returns (MsgRevokeDeviceResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "surchain/x/identity/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgRegisterUsername registers a new username with an initial device commitment.
message MsgRegisterUsername {
  option (cosmos.msg.v1.signer) = "creator";

  string creator          = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string username         = 2;
  bytes  control_pubkey   = 3;
  bytes  first_commitment = 4;
  bytes  identity_sig     = 5;
  bytes  payload          = 6;
}

// MsgRegisterUsernameResponse defines the response for RegisterUsername.
message MsgRegisterUsernameResponse {}

// MsgAddDevice adds a new device commitment to an existing identity.
message MsgAddDevice {
  option (cosmos.msg.v1.signer) = "creator";

  string creator        = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string username       = 2;
  bytes  new_commitment = 3;
  bytes  identity_sig   = 4;
  bytes  payload        = 5;
  bytes  control_pubkey = 6;
}

// MsgAddDeviceResponse defines the response for AddDevice.
message MsgAddDeviceResponse {}

// MsgRevokeDevice revokes an existing device commitment.
message MsgRevokeDevice {
  option (cosmos.msg.v1.signer) = "creator";

  string creator        = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string username       = 2;
  uint64 device_index   = 3;
  bytes  identity_sig   = 4;
  bytes  payload        = 5;
  bytes  control_pubkey = 6;
}

// MsgRevokeDeviceResponse defines the response for RevokeDevice.
message MsgRevokeDeviceResponse {}