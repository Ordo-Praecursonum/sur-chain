# Local buf gen config using pre-installed system plugins
version: v2
plugins:
  - local: /Users/monordi/go/bin/protoc-gen-gocosmos
    out: .
    opt:
      - plugins=grpc
      - Mgoogle/protobuf/any.proto=github.com/cosmos/gogoproto/types/any
      - Mcosmos/orm/v1/orm.proto=cosmossdk.io/orm
      - Mcosmos/app/v1alpha1/module.proto=cosmossdk.io/api/cosmos/app/v1alpha1
  - local: /Users/monordi/go/bin/protoc-gen-grpc-gateway
    out: .
    opt:
      - logtostderr=true
      - allow_colon_final_segments=true
